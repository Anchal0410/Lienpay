version: '3.8'

services:

  # ── PostgreSQL Database ────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: lienpay_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       lienpay_db
      POSTGRES_USER:     lienpay_user
      POSTGRES_PASSWORD: lienpay_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lienpay_user -d lienpay_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Sessions + OTP Cache) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lienpay_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── LienPay Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lienpay_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:      development
      PORT:          3000
      DB_HOST:       postgres
      DB_PORT:       5432
      DB_NAME:       lienpay_db
      DB_USER:       lienpay_user
      DB_PASSWORD:   lienpay_dev_password
      REDIS_HOST:    redis
      REDIS_PORT:    6379
      JWT_SECRET:    dev_jwt_secret_change_in_production_minimum_64_chars_long
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
